name: InfraLabMobile
options:
  bundleIdPrefix: com.eva3si0n
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T6B3L4X3A9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"

targets:
  InfraLabMobile:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets   # explicit so actool compiles it (icon → Assets.car)
      # Optional local pre-fill for personal builds. Resources/Seed/seed.json is
      # gitignored (holds real URLs/token); only seed.example.json is committed.
      - path: Resources/Seed
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: InfraLab Mobile
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleIconName: AppIcon
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Все сервисы за реальным Let's Encrypt (DNS-01 через Caddy+Cloudflare),
        # ходим только по https → ATS-исключения не нужны (cleartext-костыль убран).
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.infralab
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  InfraLabMobile:
    build:
      targets:
        InfraLabMobile: all
    run:
      config: Debug
    archive:
      config: Release
